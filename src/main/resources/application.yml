server:
  port: 8088

spring:
  application:
    name: birdlensAPI
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/birdlens}
    username: ${DB_USERNAME:birdlens}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public
    default-schema: public

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always