server:
  port: 8088

spring:
  application:
    name: birdlensAPI
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/birdlens}
    username: ${DB_USERNAME:birdlens}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Switched to validate to let Flyway handle schema creation safely
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always