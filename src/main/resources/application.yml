server:
  port: 8088

spring:
  application:
    name: birdlensAPI
  main:
    web-application-type: servlet # Explicitly set to servlet
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/birdlens}
    username: ${DB_USERNAME:birdlens}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false # Added from properties file
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
    schemas: public
    default-schema: public

# Custom properties for the application
app:
  jwt:
    secret: ${JWT_SECRET:your_super_secret_key_minimum_256_bits_length_for_local_dev}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:15}
    refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  ebird:
    api-key: ${EBIRD_API_KEY:default_ebird_key_for_dev}
    base-url: https://api.ebird.org/v2/
    supported-regions: US,VN,GB

resilience4j:
  retry:
    instances:
      ebirdClient:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always